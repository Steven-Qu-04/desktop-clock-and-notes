<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时钟主页 - 唯美纯净版 (含导出)</title>
    <style>
        /* ================= 基础重置与背景 ================= */
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            color: #ffffff; overflow: hidden;
            background-image: url('Gemini_Generated_Image_q1twsnq1twsnq1tw.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            height: 100%; width: 100%;
            background-color: rgba(0, 0, 0, 0.18); 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative;
        }

        #monitor-switcher {
            position: fixed;
            left: 18px;
            top: 18px;
            z-index: 1100;
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(10, 10, 10, 0.22);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.14);
        }
        #monitor-switcher.hidden { display: none; }
        #monitor-switcher span {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.8);
            letter-spacing: 1px;
        }
        #monitor-buttons { display: flex; gap: 6px; }
        #monitor-buttons button {
            min-width: 34px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.10);
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }
        #monitor-buttons button:hover {
            background: rgba(255,255,255,0.22);
        }
        #monitor-buttons button.active {
            background: rgba(255,255,255,0.32);
            border-color: rgba(255,255,255,0.45);
        }
        #quit-button {
            min-width: 48px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.10);
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }
        #quit-button:hover {
            background: rgba(255, 100, 100, 0.26);
            border-color: rgba(255, 150, 150, 0.45);
        }

        /* ================= 时钟样式 ================= */
        .clock-container {
            text-align: center; text-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            user-select: none; z-index: 1; pointer-events: none;
        }
        .time { font-size: 12rem; font-weight: 100; letter-spacing: 8px; margin: 0; line-height: 1; }
        .date-day { font-size: 2rem; font-weight: 300; margin-top: 25px; letter-spacing: 4px; opacity: 0.85; }

        /* ================= 侧边栏与触发按钮 ================= */
        #sidebar {
            position: fixed; right: -320px; top: 0; width: 300px; height: 100%;
            background: rgba(20, 20, 20, 0.35); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: -10px 0 30px rgba(0,0,0,0.15); 
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000; color: #fff; display: flex; flex-direction: column;
        }
        #sidebar.open { right: 0; }
        
        #sidebar-toggle {
            position: fixed; right: 0; top: 50%; transform: translateY(-50%);
            width: 24px; height: 60px;
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-right: none; border-radius: 8px 0 0 8px; 
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            z-index: 1001; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s;
            color: rgba(255,255,255,0.8); font-size: 1.2rem; user-select: none;
        }
        #sidebar-toggle:hover { background: rgba(255, 255, 255, 0.25); }
        #sidebar-toggle.open { right: 300px; } 

        .sidebar-header {
            padding: 25px 20px 15px; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .sidebar-header h2 { margin: 0; font-size: 1.1rem; font-weight: 300; letter-spacing: 2px; }
        
        /* 导出按钮样式 */
        .export-actions button {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
            padding: 4px 8px; border-radius: 6px; cursor: pointer; color: #fff;
            font-size: 0.9rem; transition: 0.2s; margin-left: 5px;
        }
        .export-actions button:hover { background: rgba(255,255,255,0.3); transform: translateY(-1px); }

        #notes-list { flex: 1; overflow-y: auto; padding: 15px; }
        #notes-list::-webkit-scrollbar { width: 4px; }
        #notes-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        .sidebar-note-item {
            background: rgba(255, 255, 255, 0.08); border-left: 3px solid rgba(255, 255, 255, 0.5);
            margin-bottom: 15px; padding: 12px; border-radius: 0 6px 6px 0;
            transition: background 0.2s;
        }
        .sidebar-note-item:hover { background: rgba(255, 255, 255, 0.12); }
        .sidebar-note-item .time-lbl { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-bottom: 8px; font-weight: 300; }
        .sidebar-note-item .text-preview { 
            font-size: 0.9rem; line-height: 1.4; color: #eee;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 12px; 
        }
        .sidebar-note-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 8px; }
        .sidebar-note-actions button {
            background: rgba(255,255,255,0.1); border: none; padding: 5px 10px; border-radius: 4px; 
            cursor: pointer; font-size: 0.75rem; color: #ddd; transition: 0.2s;
        }
        .sidebar-note-actions button:hover { background: rgba(255,255,255,0.25); color: #fff; }
        .sidebar-note-actions button.btn-delete:hover { background: rgba(255, 80, 80, 0.5); }

        .reminder-container {
            background: rgba(0,0,0,0.15); padding: 6px 8px; border-radius: 4px;
            display: flex; align-items: center; font-size: 0.8rem; gap: 6px;
        }
        .reminder-input {
            background: transparent; border: 1px solid rgba(255,255,255,0.2); 
            color: #fff; border-radius: 4px; padding: 2px 5px; font-family: inherit; 
            outline: none; color-scheme: dark; 
        }
        .reminder-input:focus { border-color: rgba(255,255,255,0.6); }

        /* ================= 便签工作区 ================= */
        #notes-workspace { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        
        .sticky-note {
            position: absolute; 
            background: rgba(255, 255, 255, 0.12); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.25); 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1), inset 0 0 20px rgba(255,255,255,0.05); 
            color: #fff; border-radius: 12px; 
            display: flex; flex-direction: column; pointer-events: auto;
            min-width: 180px; min-height: 120px;
            resize: both; overflow: auto;
            transition: box-shadow 0.3s, border-color 0.3s;
            animation: fadeIn 0.3s ease-out;
            scrollbar-width: none;
        }
        .sticky-note::-webkit-scrollbar { width: 0; height: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        @keyframes glowingHighlight {
            0% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.3), inset 0 0 10px rgba(255, 215, 0, 0.1); border-color: rgba(255, 255, 255, 0.4); }
            100% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.8), inset 0 0 25px rgba(255, 215, 0, 0.4); border-color: rgba(255, 215, 0, 0.9); }
        }
        .sticky-note.highlighted {
            animation: glowingHighlight 1.2s infinite alternate;
        }

        .note-header {
            padding: 10px 15px; cursor: grab;
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); user-select: none;
        }
        .note-header:active { cursor: grabbing; }
        .note-header .note-date { font-size: 0.75rem; color: rgba(255,255,255,0.6); font-weight: 300; }
        .note-header .note-actions span { 
            cursor: pointer; margin-left: 12px; font-size: 0.9rem; opacity: 0.5; transition: 0.2s;
        }
        .note-header .note-actions span:hover { opacity: 1; text-shadow: 0 0 8px rgba(255,255,255,0.6); }

        .note-body { flex: 1; padding: 12px 15px; display: flex; flex-direction: column; }
        .note-body textarea {
            flex: 1; border: none; background: transparent; resize: none; 
            outline: none; font-family: inherit; font-size: 1rem; font-weight: 300; color: #fff; 
            line-height: 1.6; text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            min-width: 0; min-height: 80px;
            width: 100%; height: 100%;
            box-sizing: border-box;
        }
        .note-body textarea::placeholder { color: rgba(255,255,255,0.4); }
        .note-body textarea::-webkit-scrollbar { width: 0px; } 
    </style>
</head>
<body>

    <div class="overlay">
        <div id="monitor-switcher" class="hidden">
            <span>屏幕</span>
            <div id="monitor-buttons"></div>
            <button id="quit-button" type="button">退出</button>
        </div>
        <div class="clock-container">
            <div class="time" id="time">00:00</div>
            <div class="date-day" id="date-day">0000 / 00 / 00   星期一</div>
        </div>
        <div id="notes-workspace"></div>
    </div>

    <div id="sidebar-toggle">‹</div>
    
    <div id="sidebar">
        <div class="sidebar-header">
            <h2>便签时光轴</h2>
            <div class="export-actions">
                <button onclick="exportToTXT()" title="导出为纯文本 (TXT)">📄</button>
                <button onclick="exportToICS()" title="导出为日历文件 (ICS)">📅</button>
            </div>
        </div>
        <div id="notes-list"></div>
    </div>

    <script>
        // ================= 时钟与后台检查逻辑 =================
        function updateClock() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const day = days[now.getDay()];
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${minutes}`;
            document.getElementById('date-day').textContent = `${year} / ${month} / ${date}   ${day}`;

            checkReminders();
        }

        // ================= 便签系统逻辑 =================
        let notes = [];
        const STORAGE_KEY = 'my_aesthetic_notes';
        const RECOVERED_NOTES = [
            {
                id: 'mmcuiuahgcxdzap13cq',
                text: '厚德载物',
                createdAt: '2026/3/5 10:28',
                timestamp: new Date(2026, 2, 5, 10, 28).getTime(),
                isHidden: false,
                isHighlighted: false,
                reminderTime: null,
                x: 347,
                y: 642,
                width: 220,
                height: 160,
                zIndex: 87
            }
        ];
        let highestZIndex = 10; 
        
        let draggingNoteId = null;
        let draggingElement = null;
        let dragStartX = 0, dragStartY = 0, dragStartLeft = 0, dragStartTop = 0;

        const workspace = document.getElementById('notes-workspace');
        const notesList = document.getElementById('notes-list');
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const monitorSwitcher = document.getElementById('monitor-switcher');
        const monitorButtons = document.getElementById('monitor-buttons');
        const quitButton = document.getElementById('quit-button');
        const hostBridge = window.chrome && window.chrome.webview ? window.chrome.webview : null;

        sidebarToggle.addEventListener('click', () => {
            const isOpen = sidebar.classList.toggle('open');
            sidebarToggle.classList.toggle('open');
            sidebarToggle.innerHTML = isOpen ? '›' : '‹'; 
        });

        function renderMonitorButtons(monitors, activeIndex) {
            if (!hostBridge || !Array.isArray(monitors) || monitors.length === 0) {
                monitorSwitcher.classList.add('hidden');
                monitorButtons.innerHTML = '';
                return;
            }

            monitorSwitcher.classList.remove('hidden');
            monitorButtons.innerHTML = '';

            const allButton = document.createElement('button');
            allButton.textContent = '双屏';
            allButton.className = activeIndex === 0 ? 'active' : '';
            allButton.title = '同时显示在所有屏幕';
            allButton.addEventListener('click', () => {
                hostBridge.postMessage({ type: 'move-to-monitor', index: 0 });
            });
            monitorButtons.appendChild(allButton);

            monitors.forEach(monitor => {
                const button = document.createElement('button');
                button.textContent = monitor.label || String(monitor.index);
                button.className = monitor.index === activeIndex ? 'active' : '';
                button.title = monitor.name || '';
                button.addEventListener('click', () => {
                    hostBridge.postMessage({ type: 'move-to-monitor', index: monitor.index });
                });
                monitorButtons.appendChild(button);
            });
        }

        if (hostBridge) {
            quitButton.addEventListener('click', () => {
                hostBridge.postMessage({ type: 'quit-app' });
            });
            hostBridge.addEventListener('message', event => {
                const data = event.data || {};
                if (data.type === 'monitor-info') {
                    renderMonitorButtons(data.monitors, data.activeIndex);
                }
            });
        } else {
            quitButton.style.display = 'none';
        }

        function checkReminders() {
            const currentMs = Date.now();
            let needsRender = false;

            notes.forEach(note => {
                if (note.reminderTime && note.reminderTime <= currentMs) {
                    note.isHidden = false;         
                    note.isHighlighted = true;     
                    note.reminderTime = null;      
                    
                    highestZIndex++;
                    note.zIndex = highestZIndex;   
                    
                    needsRender = true;
                }
            });

            if (needsRender) { saveNotes(); renderAll(); }
        }

        workspace.addEventListener('mousedown', (e) => {
            const noteEl = e.target.closest('.sticky-note');
            if (!noteEl) return; 

            const noteId = noteEl.dataset.id;
            const note = notes.find(n => n.id === noteId);
            if (!note) return;

            if (note.isHighlighted) {
                note.isHighlighted = false;
                noteEl.classList.remove('highlighted');
                saveNotes();
                renderSidebar(); 
            }

            highestZIndex++;
            noteEl.style.zIndex = highestZIndex;
            note.zIndex = highestZIndex;
            saveNotes();

            const header = e.target.closest('.note-header');
            if (header && e.target.tagName !== 'SPAN') { 
                draggingNoteId = noteId;
                draggingElement = noteEl;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                dragStartLeft = note.x;
                dragStartTop = note.y;
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!draggingNoteId || !draggingElement) return;
            const note = notes.find(n => n.id === draggingNoteId);
            if (!note) return;

            const dx = e.clientX - dragStartX;
            const dy = e.clientY - dragStartY;
            note.x = Math.max(0, dragStartLeft + dx); 
            note.y = Math.max(0, dragStartTop + dy);  
            draggingElement.style.left = note.x + 'px';
            draggingElement.style.top = note.y + 'px';
        });

        document.addEventListener('mouseup', () => {
            if (draggingNoteId) {
                draggingNoteId = null;
                draggingElement = null;
                saveNotes(); 
            }
        });

        workspace.addEventListener('input', (e) => {
            if (e.target.tagName === 'TEXTAREA') {
                const noteEl = e.target.closest('.sticky-note');
                const note = notes.find(n => n.id === noteEl.dataset.id);
                if (note) { note.text = e.target.value; saveNotes(); }
            }
        });

        workspace.addEventListener('dblclick', (e) => {
            if (e.target.closest('.sticky-note')) return;
            const now = new Date();
            const timeString = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            highestZIndex++;

            const newNote = {
                id: Date.now().toString(36) + Math.random().toString(36).substring(2),
                text: '', createdAt: timeString, timestamp: Date.now(),
                isHidden: false, isHighlighted: false, reminderTime: null,
                x: e.clientX, y: e.clientY, width: 220, height: 160, zIndex: highestZIndex
            };
            notes.push(newNote); saveNotes(); renderAll();
        });

        const noteResizeObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
                const noteEl = entry.target;
                if (!noteEl) continue;
                const note = notes.find(n => n.id === noteEl.dataset.id);
                if (note) {
                    note.width = Math.round(entry.contentRect.width);
                    note.height = Math.round(entry.contentRect.height);
                    saveNotes();
                }
            }
        });

        function mergeRecoveredNotes(existingNotes) {
            const normalizedNotes = Array.isArray(existingNotes) ? existingNotes : [];
            const existingIds = new Set(normalizedNotes.map(note => note.id));
            let changed = false;

            RECOVERED_NOTES.forEach(note => {
                if (!existingIds.has(note.id)) {
                    normalizedNotes.push({ ...note });
                    existingIds.add(note.id);
                    changed = true;
                }
            });

            return { notes: normalizedNotes, changed };
        }

        function initNotes() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    notes = JSON.parse(saved);
                } catch (error) {
                    notes = [];
                }
            }
            const mergeResult = mergeRecoveredNotes(notes);
            notes = mergeResult.notes;
            if (mergeResult.changed) saveNotes();
            renderAll();
        }

        function saveNotes() { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); }

        function renderAll() { renderWorkspace(); renderSidebar(); }

        function renderWorkspace() {
            noteResizeObserver.disconnect();
            workspace.innerHTML = '';
            notes.filter(n => !n.isHidden).forEach(note => {
                const noteEl = document.createElement('div');
                noteEl.className = 'sticky-note' + (note.isHighlighted ? ' highlighted' : '');
                noteEl.dataset.id = note.id;
                noteEl.style.left = note.x + 'px'; noteEl.style.top = note.y + 'px';
                noteEl.style.width = (note.width || 220) + 'px';
                noteEl.style.height = (note.height || 160) + 'px';
                noteEl.style.zIndex = note.zIndex || 10; 
                if((note.zIndex || 10) > highestZIndex) highestZIndex = note.zIndex || 10;

                noteEl.innerHTML = `
                    <div class="note-header">
                        <span class="note-date">${note.createdAt}</span>
                        <div class="note-actions">
                            <span onclick="hideNote('${note.id}')" title="隐藏">👁️</span>
                            <span onclick="deleteNote('${note.id}')" title="删除">✕</span>
                        </div>
                    </div>
                    <div class="note-body">
                        <textarea placeholder="记点什么...">${note.text}</textarea>
                    </div>
                `;
                workspace.appendChild(noteEl);
                noteResizeObserver.observe(noteEl);
            });
        }

        function formatForInput(ms) {
            if (!ms) return '';
            const d = new Date(ms);
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function renderSidebar() {
            notesList.innerHTML = '';
            const sortedNotes = [...notes].sort((a, b) => b.timestamp - a.timestamp);
            if(sortedNotes.length === 0) {
                notesList.innerHTML = '<p style="color:rgba(255,255,255,0.4); text-align:center; font-weight:300; margin-top:40px;">尚未创建便签</p>';
                return;
            }

            sortedNotes.forEach(note => {
                const el = document.createElement('div');
                el.className = 'sidebar-note-item';
                const previewText = note.text.trim() === '' ? '[空便签]' : note.text.substring(0, 25) + '...';
                const timeValue = formatForInput(note.reminderTime);
                
                el.innerHTML = `
                    <div class="time-lbl">
                        ${note.createdAt} 
                        ${note.isHighlighted ? '<span style="color:#ffd700; float:right;">⏰ 提醒中</span>' : (note.isHidden ? '<span style="color:rgba(255,255,255,0.3); float:right;">已隐藏</span>' : '')}
                    </div>
                    <div class="text-preview">${previewText}</div>
                    <div class="sidebar-note-actions">
                        ${note.isHidden 
                            ? `<button onclick="restoreNote('${note.id}')">还原</button>` 
                            : `<button onclick="hideNote('${note.id}')">隐藏</button>`
                        }
                        <button class="btn-delete" onclick="deleteNote('${note.id}')">删除</button>
                    </div>
                    <div class="reminder-container">
                        ⏰ <input type="datetime-local" class="reminder-input" title="设置提醒时间" value="${timeValue}" onchange="setReminder('${note.id}', this.value)">
                        ${note.reminderTime ? `<button onclick="setReminder('${note.id}', '')" style="background:none; color:#f88; padding:0; border:none;">清除</button>` : ''}
                    </div>
                `;
                notesList.appendChild(el);
            });
        }

        window.hideNote = function(id) {
            const note = notes.find(n => n.id === id);
            if(note) { note.isHidden = true; saveNotes(); renderWorkspace(); renderSidebar(); }
        }
        window.restoreNote = function(id) {
            const note = notes.find(n => n.id === id);
            if(note) { note.isHidden = false; saveNotes(); renderWorkspace(); renderSidebar(); }
        }
        window.deleteNote = function(id) {
            if(confirm('确定要彻底删除这条便签吗？')) {
                notes = notes.filter(n => n.id !== id);
                saveNotes(); renderAll();
            }
        }
        window.setReminder = function(id, value) {
            const note = notes.find(n => n.id === id);
            if (note) {
                if (value) {
                    note.reminderTime = new Date(value).getTime();
                    note.isHighlighted = false; 
                } else {
                    note.reminderTime = null;
                }
                saveNotes(); renderSidebar();
            }
        }

        // ================= 导出功能逻辑 =================
        function triggerDownload(content, filename, type) {
            const blob = new Blob([content], { type: type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        window.exportToTXT = function() {
            if (notes.length === 0) { alert('没有便签可导出！'); return; }
            let txtContent = "=== 我的唯美便签 ===\n\n";
            const sortedNotes = [...notes].sort((a, b) => b.timestamp - a.timestamp);
            
            sortedNotes.forEach(note => {
                txtContent += `[创建时间]: ${note.createdAt}\n`;
                if (note.reminderTime) {
                    const rDate = new Date(note.reminderTime);
                    txtContent += `[提醒时间]: ${rDate.getFullYear()}/${rDate.getMonth()+1}/${rDate.getDate()} ${String(rDate.getHours()).padStart(2,'0')}:${String(rDate.getMinutes()).padStart(2,'0')}\n`;
                }
                txtContent += `[内容]:\n${note.text || '（空）'}\n`;
                txtContent += `---------------------------------------\n\n`;
            });

            triggerDownload(txtContent, '我的便签导出.txt', 'text/plain;charset=utf-8');
        }

        // 格式化日期为 ICS 要求的标准 (YYYYMMDDTHHMMSS)
        function formatToICSDT(ms) {
            const d = new Date(ms);
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
        }

        function formatToICSDate(date) {
            const pad = n => String(n).padStart(2, '0');
            return `${date.getFullYear()}${pad(date.getMonth()+1)}${pad(date.getDate())}`;
        }

        window.exportToICS = function() {
            if (notes.length === 0) { alert('没有便签可导出！'); return; }
            
            let icsContent = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//MyAestheticNotes//CN\r\nCALSCALE:GREGORIAN\r\n";
            const exportDay = new Date();
            const exportDayStart = new Date(exportDay.getFullYear(), exportDay.getMonth(), exportDay.getDate());
            const exportDayEnd = new Date(exportDayStart.getTime() + 24 * 60 * 60 * 1000);
            
            notes.forEach(note => {
                // 将换行符转义为 ICS 支持的格式
                const summary = note.text.trim() === '' ? '空便签' : note.text.substring(0, 20).replace(/\n/g, ' ');
                const description = note.text.replace(/\n/g, '\\n');

                icsContent += "BEGIN:VEVENT\r\n";
                icsContent += `UID:${note.id}@myaestheticnotes\r\n`;
                icsContent += `DTSTAMP:${formatToICSDT(Date.now())}Z\r\n`;
                if (note.reminderTime) {
                    const dtStart = formatToICSDT(note.reminderTime);
                    const dtEnd = formatToICSDT(note.reminderTime + 3600000);
                    icsContent += `DTSTART:${dtStart}\r\n`;
                    icsContent += `DTEND:${dtEnd}\r\n`;
                } else {
                    icsContent += `DTSTART;VALUE=DATE:${formatToICSDate(exportDayStart)}\r\n`;
                    icsContent += `DTEND;VALUE=DATE:${formatToICSDate(exportDayEnd)}\r\n`;
                }
                icsContent += `SUMMARY:${summary}\r\n`;
                icsContent += `DESCRIPTION:${description}\r\n`;
                
                // 如果设置了提醒，在日历文件中加入闹钟提醒触发器（提前 0 分钟触发）
                if (note.reminderTime) {
                    icsContent += "BEGIN:VALARM\r\nACTION:DISPLAY\r\nDESCRIPTION:便签提醒\r\nTRIGGER:-PT0M\r\nEND:VALARM\r\n";
                }
                icsContent += "END:VEVENT\r\n";
            });
            
            icsContent += "END:VCALENDAR";
            triggerDownload(icsContent, '我的便签日历.ics', 'text/calendar;charset=utf-8');
        }

        // 启动时钟与初始化
        updateClock(); 
        setInterval(updateClock, 1000); 
        initNotes();
        if (hostBridge) {
            hostBridge.postMessage({ type: 'get-monitor-info' });
        }
    </script>

</body>
</html
